# 올바른교육(allbarreun-edu) 전용 — jeongsu-lms Vercel Deploy Hook 사용 금지
#
# Vercel에서 allbarreun-edu 프로젝트를 GitHub 저장소와 연결하면 main push만으로 배포됩니다.
# Deploy Hook을 쓸 때만: Vercel(allbarreun-edu) → Deploy Hooks → GitHub Secret
#   이름: ALLBARREUN_VERCEL_DEPLOY_HOOK (기존 VERCEL_DEPLOY_HOOK 은 jeongsu용이면 삭제)

name: Deploy allbarreun-edu to Vercel (Production)

on:
  workflow_dispatch:

concurrency:
  group: vercel-allbarreun-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        env:
          DEPLOY_HOOK: ${{ secrets.ALLBARREUN_VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::ALLBARREUN_VERCEL_DEPLOY_HOOK secret이 없습니다."
            echo "Vercel 프로젝트 allbarreun-edu → Settings → Git → Deploy Hooks"
            echo "GitHub 저장소 allbarreun-edu → Secrets → ALLBARREUN_VERCEL_DEPLOY_HOOK"
            echo "jeongsu-lms 프로젝트의 Hook URL은 사용하지 마세요."
            exit 1
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"
          echo "allbarreun-edu Vercel 배포가 시작되었습니다."
